<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="iconGradApp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#26A69A"/>
    </linearGradient>
    <linearGradient id="badgeGradApp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D"/>
      <stop offset="100%" style="stop-color:#F0C420"/>
    </linearGradient>
    <filter id="dropShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#iconGradApp)"/>

  <!-- Home shape -->
  <path d="M256,88 L82,208 L82,388 Q82,404 98,404 L414,404 Q430,404 430,388 L430,208 Z" fill="white" opacity="0.95"/>

  <!-- Person silhouette -->
  <circle cx="256" cy="244" r="48" fill="#2DB5A6"/>
  <path d="M184,376 Q184,312 256,300 Q328,312 328,376" fill="#2DB5A6"/>

  <!-- Checkmark badge -->
  <circle cx="388" cy="144" r="62" fill="url(#badgeGradApp)"/>
  <path d="M356,144 L378,168 L420,122" stroke="white" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>